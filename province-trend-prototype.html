<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>各省趋势均值 — 原型预览</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: #f5f7fa; color: #606266; font-size: 14px; line-height: 1.5;
    }
    .page { max-width: 1520px; margin: 0 auto; padding: 20px; }

    /* ── 筛选栏 ── */
    .filter-bar {
      background: #fff; border-radius: 4px; padding: 18px 20px 14px;
      margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .filter-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
    .filter-row:last-child { margin-bottom: 0; }
    .filter-label { font-size: 14px; color: #606266; white-space: nowrap; }

    .el-btn {
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #dcdfe6; border-radius: 4px;
      padding: 5px 12px; font-size: 12px; cursor: pointer;
      transition: all .2s; background: #fff; color: #606266; height: 28px;
    }
    .el-btn:hover { color: #409EFF; border-color: #c6e2ff; background: #ecf5ff; }
    .el-btn--danger { border-color: #f56c6c; color: #f56c6c; }
    .el-btn--danger:hover { background: #fef0f0; }
    .el-btn--warning { border-color: #e6a23c; color: #e6a23c; }
    .el-btn--warning:hover { background: #fdf6ec; }

    .el-radio-group { display: inline-flex; }
    .el-radio-group .radio-item {
      border: 1px solid #dcdfe6; padding: 7px 16px; font-size: 13px;
      cursor: pointer; transition: all .2s; color: #606266;
      background: #fff; margin-right: -1px;
    }
    .el-radio-group .radio-item:first-child { border-radius: 4px 0 0 4px; }
    .el-radio-group .radio-item:last-child { border-radius: 0 4px 4px 0; }
    .el-radio-group .radio-item.active {
      background: #409EFF; border-color: #409EFF; color: #fff; z-index: 1; position: relative;
    }

    .el-select {
      width: 220px; height: 32px;
      border: 1px solid #dcdfe6; border-radius: 4px;
      background: #fff; color: #606266; font-size: 13px;
      padding: 0 32px 0 12px; outline: none; cursor: pointer;
      transition: border-color .2s, box-shadow .2s;
      appearance: none; -webkit-appearance: none; -moz-appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #909399 50%), linear-gradient(135deg, #909399 50%, transparent 50%);
      background-position: calc(100% - 18px) 13px, calc(100% - 12px) 13px;
      background-size: 6px 6px, 6px 6px;
      background-repeat: no-repeat;
    }
    .el-select:hover { border-color: #c0c4cc; }
    .el-select:focus { border-color: #409EFF; box-shadow: 0 0 0 2px rgba(64,158,255,0.12); }

    .el-input {
      width: 140px; height: 32px;
      border: 1px solid #dcdfe6; border-radius: 4px;
      background: #fff; color: #606266; font-size: 13px;
      padding: 0 12px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .el-input:hover { border-color: #c0c4cc; }
    .el-input:focus { border-color: #409EFF; box-shadow: 0 0 0 2px rgba(64,158,255,0.12); }
    .filter-hint { font-size: 12px; color: #909399; }

    /* ── 面包屑 ── */
    .breadcrumb {
      font-size: 13px; color: #909399; margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .breadcrumb a { color: #409EFF; text-decoration: none; cursor: pointer; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb .sep { color: #c0c4cc; }

    /* ── 卡片 ── */
    .card {
      background: #fff; border-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 16px; overflow: hidden;
    }
    .card-header {
      padding: 14px 20px 12px; border-bottom: 1px solid #ebeef5;
      display: flex; align-items: center; justify-content: space-between;
    }
    .card-title { font-size: 15px; font-weight: 600; color: #303133; }
    .card-sub { font-size: 12px; color: #909399; margin-top: 2px; }
    .card-body { padding: 16px 20px; min-width: 0; }

    .grid-2 { display: grid; grid-template-columns: minmax(0, 1fr) 540px; gap: 16px; }
    @media (max-width: 1100px) { .grid-2 { grid-template-columns: 1fr; } }

    .chart-box { height: 400px; width: 100%; }

    /* ── 排行表（含7天均值列） ── */
    .rank-table {
      width: calc(100% - 20px);
      min-width: 0;
      margin-right: 20px;
      padding-right: 12px;
    }
    .rank-row {
      display: grid; grid-template-columns: 40px minmax(96px, 1.18fr) minmax(84px, 0.92fr) minmax(76px, 0.8fr) minmax(60px, 0.58fr) 92px;
      align-items: center; min-height: 42px;
      border-bottom: 1px solid #ebeef5; font-size: 12px;
      cursor: pointer; transition: background .15s;
      column-gap: 8px;
      width: 100%; min-width: 0;
      padding: 0 10px 0 12px;
    }
    .rank-row:hover { background: #f5f7fa; }
    .rank-row.hover-highlight {
      background: #f0f7ff;
      box-shadow: inset 3px 0 0 #409EFF;
    }
    .rank-row.lock-highlight {
      background: #ecf5ff;
      box-shadow: inset 4px 0 0 #1f78ff;
    }
    .rank-row.dimmed { opacity: 0.35; }
    .rank-num {
      width: 20px; height: 20px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 600; margin: 0 auto;
    }
    .r1 { background: #f56c6c; color: #fff; }
    .r2 { background: #e6a23c; color: #fff; }
    .r3 { background: #409EFF; color: #fff; }
    .rn { background: #ebeef5; color: #909399; }
    .rank-prov { color: #303133; font-weight: 500; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; }
    .rank-val { text-align: right; padding-right: 4px; color: #303133; font-weight: 500; font-size: 12px; white-space: nowrap; min-width: 0; }
    .rank-threshold { text-align: right; padding-right: 4px; font-size: 11px; white-space: nowrap; min-width: 0; }
    .rank-status { display: flex; align-items: center; justify-content: flex-end; min-width: 0; padding-right: 6px; }
    .rank-alert { color: #f56c6c; font-weight: 600; }
    .rank-normal { color: #67c23a; }
    .rank-tag {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 38px; height: 24px;
      border-radius: 12px; font-size: 11px; font-weight: 600;
      padding: 0 10px; color: #fff; line-height: 1;
      box-shadow: 0 1px 2px rgba(0,0,0,0.08);
      white-space: nowrap;
    }
    .rank-head { font-weight: 600; color: #909399; font-size: 11px; border-bottom: 2px solid #ebeef5; cursor: default; }
    .rank-head > div:first-child { text-align: center; }
    .rank-head .rank-prov { font-weight: 600; color: #909399; }
    .rank-head .rank-val,
    .rank-head .rank-threshold { color: #909399; font-weight: 600; }
    .rank-head .rank-status {
      color: #909399;
      font-weight: 600;
      justify-content: center;
      padding-right: 0;
    }
    .tag-alert { background: #f56c6c; }
    .tag-normal { background: #67c23a; }

    /* ── 热力表 ── */
    .hm-wrap { overflow: auto; max-height: 520px; border-top: 1px solid #ebeef5; }
    .hm-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .hm-table th {
      position: sticky; top: 0; z-index: 2;
      background: #ecebee; color: #909399; font-weight: 600;
      padding: 10px 8px; white-space: nowrap; border-bottom: 1px solid #dfe6f0; box-shadow: 0 1px 0 rgba(255,255,255,0.9) inset;
    }
    .hm-table th:first-child { text-align: left; padding-left: 12px; min-width: 88px; position: sticky; left: 0; z-index: 5; background: #ecebee; box-shadow: 2px 0 8px rgba(31,120,255,0.08); }
    .hm-table td { text-align: center; height: 38px; min-width: 64px; padding: 0; border-bottom: 1px solid #f0f2f5; }
    .hm-table td:first-child {
      text-align: left; padding-left: 12px; font-weight: 500; color: #303133;
      background: #fff; position: sticky; left: 0; z-index: 4; white-space: nowrap; box-shadow: 2px 0 8px rgba(31,120,255,0.06);
    }
    .hm-cell {
      display: inline-flex; align-items: center; justify-content: center;
      width: calc(100% - 6px); height: 30px; border-radius: 4px;
      margin: 3px; font-size: 12px; color: #303133; font-weight: 600;
      cursor: default; transition: transform .12s;
    }
    .hm-cell:hover { transform: scale(1.1); z-index: 4; }
    .hm-cell.alert-cell {
      border: 2px solid #f56c6c !important;
      box-shadow: inset 0 0 0 1px rgba(245,108,108,0.22);
      position: relative;
    }
    .hm-cell.alert-cell::after {
      content: '';
      position: absolute;
      top: 4px;
      right: 5px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f56c6c;
      box-shadow: 0 0 0 2px rgba(245,108,108,0.16);
    }
    .hm-name-alert {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .hm-name-alert::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f56c6c;
      box-shadow: 0 0 0 2px rgba(245,108,108,0.16);
      flex: 0 0 auto;
    }
    .hm-row.hover-highlight td:first-child {
      background: #f0f7ff;
      color: #1f78ff;
      box-shadow: inset 3px 0 0 #409EFF;
    }
    .hm-row.lock-highlight td:first-child {
      background: #ecf5ff;
      color: #1f78ff;
      box-shadow: inset 4px 0 0 #1f78ff;
    }
    .hm-row.dimmed { opacity: 0.35; }

    /* ── 图例 ── */
    .legend { display: flex; gap: 16px; font-size: 12px; color: #909399; margin-top: 8px; }
    .legend span { display: inline-flex; align-items: center; gap: 4px; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
  </style>
</head>
<body>
<div class="page">

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <div class="filter-row">
      <span class="filter-label">指标：</span>
      <div class="el-radio-group" id="metricGroup"></div>
      <span class="filter-label" style="margin-left:16px;" id="breadcrumbArea"></span>
    </div>
    <div class="filter-row" id="provBarRow">
      <span class="filter-label">省份：</span>
      <select id="provSelect" class="el-select" onchange="onProvinceSelectChange(this.value)"></select>
      <span class="filter-label">告警阈值：</span>
      <input id="alertThresholdInput" class="el-input" type="number" min="0" step="1" value="30" onchange="onAlertThresholdChange(this.value)" />
      <span class="filter-hint">高于此值判定为告警</span>
    </div>
  </div>

  <!-- 面包屑 -->
  <div class="breadcrumb" id="breadcrumb"></div>

  <!-- 图例 -->
  <div class="legend" style="margin-bottom:12px;">
    <span><span class="legend-dot" style="background:#67c23a;"></span> 0-20ms 绿区（正常）</span>
    <span><span class="legend-dot" style="background:#e6a23c;"></span> 20-30ms 黄区（关注）</span>
    <span><span class="legend-dot" style="background:#f56c6c;"></span> &gt;30ms 红区（告警）</span>
  </div>

  <!-- 图表 + 排行 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title" id="chartTitle">近 7 天趋势对比</div>
          <div class="card-sub" id="chartSub">点击图例可高亮单省</div>
        </div>
      </div>
      <div class="card-body"><div class="chart-box" id="chartMain"></div></div>
    </div>
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">省份排行</div>
          <div class="card-sub" id="rankSub">按 7 天均值降序</div>
        </div>
      </div>
      <div class="card-body" style="padding:0 8px 0 0;max-height:440px;overflow-y:auto;overflow-x:hidden;scrollbar-gutter:stable both-edges;" id="rankBody"></div>
    </div>
  </div>

  <!-- 热力矩阵 -->
  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">每日明细矩阵</div>
        <div class="card-sub" id="hmSub">省份 × 日期，颜色编码时延级别</div>
      </div>
    </div>
    <div class="card-body" style="padding:0;"><div class="hm-wrap" id="hmWrap"></div></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════
   Mock Data — 对齐真实 DetectionRecord 结构
   destResourcePool = 省份（如"山东省"）
   destAz = 目的地市+方向点（如"德州市-最北点"）
   GROUP BY destResourcePool → 省级
   GROUP BY destAz 提取城市名 → 地市级下钻
   ════════════════════════════════════════════ */
const PROVINCES_DATA = {
  '山东': { baseDelay: 14, cities: {
    '济南市': { base: 12, points: ['最北点','最东点','最西点','最南点'] },
    '青岛市': { base: 13, points: ['最北点','最东点'] },
    '烟台市': { base: 15, points: ['最北点','最南点'] },
    '潍坊市': { base: 14, points: ['最北点','最南点'] },
    '临沂市': { base: 13, points: ['最西点','最东点'] },
    '威海市': { base: 16, points: ['最西点','最东点'] },
    '德州市': { base: 11, points: ['最北点','最南点'] },
    '淄博市': { base: 12, points: ['最北点','最南点'] },
    '日照市': { base: 14, points: ['最北点','最南点'] },
  }},
  '江苏': { baseDelay: 12, cities: {
    '南京市': { base: 11, points: ['最北点','最南点'] },
    '苏州市': { base: 10, points: ['最东点','最西点'] },
    '南通市': { base: 13, points: ['最北点','最南点'] },
    '无锡市': { base: 10, points: ['最北点','最南点'] },
  }},
  '浙江': { baseDelay: 11, cities: {
    '杭州市': { base: 10, points: ['最北点','最南点'] },
    '宁波市': { base: 9, points: ['最东点','最西点'] },
    '温州市': { base: 12, points: ['最北点','最南点'] },
  }},
  '广东': { baseDelay: 23, cities: {
    '广州市': { base: 24, points: ['最北点','最南点'] },
    '深圳市': { base: 27, points: ['最东点','最西点'] },
    '东莞市': { base: 22, points: ['最北点','最南点'] },
  }},
  '四川': { baseDelay: 28, cities: {
    '成都市': { base: 29, points: ['最北点','最南点','最东点'] },
    '绵阳市': { base: 31, points: ['最北点','最南点'] },
    '德阳市': { base: 27, points: ['最北点','最南点'] },
  }},
  '河南': { baseDelay: 13, cities: {
    '郑州市': { base: 12, points: ['最北点','最南点'] },
    '洛阳市': { base: 14, points: ['最北点','最南点'] },
    '开封市': { base: 13, points: ['最北点','最南点'] },
  }},
  '河北': { baseDelay: 14, cities: {
    '石家庄市': { base: 13, points: ['最北点','最南点'] },
    '秦皇岛市': { base: 15, points: ['最北点','最南点'] },
    '唐山市': { base: 14, points: ['最北点','最南点'] },
  }},
  '湖北': { baseDelay: 12, cities: {
    '武汉市': { base: 11, points: ['最北点','最南点'] },
    '宜昌市': { base: 13, points: ['最北点','最南点'] },
    '襄阳市': { base: 12, points: ['最北点','最南点'] },
  }},
  '湖南': { baseDelay: 13, cities: {
    '长沙市': { base: 12, points: ['最北点','最南点'] },
    '株洲市': { base: 14, points: ['最北点','最南点'] },
    '湘潭市': { base: 13, points: ['最北点','最南点'] },
  }},
  '福建': { baseDelay: 11, cities: {
    '福州市': { base: 10, points: ['最北点','最南点'] },
    '厦门市': { base: 9, points: ['最东点','最西点'] },
    '泉州市': { base: 11, points: ['最北点','最南点'] },
  }},
  '安徽': { baseDelay: 12, cities: {
    '合肥市': { base: 11, points: ['最北点','最南点'] },
    '芜湖市': { base: 13, points: ['最北点','最南点'] },
    '蚌埠市': { base: 12, points: ['最北点','最南点'] },
  }},
  '辽宁': { baseDelay: 15, cities: {
    '沈阳市': { base: 14, points: ['最北点','最南点'] },
    '大连市': { base: 13, points: ['最东点','最西点'] },
    '鞍山市': { base: 16, points: ['最北点','最南点'] },
  }},
  '陕西': { baseDelay: 14, cities: {
    '西安市': { base: 13, points: ['最北点','最南点'] },
    '咸阳市': { base: 15, points: ['最北点','最南点'] },
    '宝鸡市': { base: 14, points: ['最北点','最南点'] },
  }},
  '云南': { baseDelay: 31, cities: {
    '昆明市': { base: 30, points: ['最北点','最南点'] },
    '曲靖市': { base: 34, points: ['最北点','最南点'] },
    '玉溪市': { base: 32, points: ['最北点','最南点'] },
  }},
  '贵州': { baseDelay: 34, cities: {
    '贵阳市': { base: 33, points: ['最北点','最南点'] },
    '遵义市': { base: 36, points: ['最北点','最南点'] },
    '六盘水市': { base: 38, points: ['最北点','最南点'] },
  }},
};

const PROVINCES = Object.keys(PROVINCES_DATA);

// 7 天日期
const today = new Date('2026-06-11');
const dates = [];
for (let i = 6; i >= 0; i--) {
  const d = new Date(today); d.setDate(d.getDate() - i);
  dates.push(d.toISOString().slice(0, 10));
}

function srand(seed) { let s = seed; return () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; }; }

// 生成省级 mock 数据
const PROV_DATA = {};
PROVINCES.forEach((prov, pi) => {
  const rng = srand(pi * 137 + 42);
  const base = PROVINCES_DATA[prov].baseDelay;
  PROV_DATA[prov] = dates.map((date, di) => {
    const trend = Math.sin(di / 3 + pi) * 2.5;
    const jitter = (rng() - 0.5) * 7;
    return { date, avg_delay: Math.max(3, +(base + trend + jitter).toFixed(2)) };
  });
});

// 生成地市级 mock 数据（下钻用）
// 每个地市 = 该城市所有探测点的 AVG(avg_delay)
const CITY_DATA = {};
PROVINCES.forEach(prov => {
  const cities = PROVINCES_DATA[prov].cities;
  CITY_DATA[prov] = {};
  Object.entries(cities).forEach(([city, info], ci) => {
    const rng = srand(PROVINCES.indexOf(prov) * 1000 + ci * 137 + 42);
    // 城市级 = 所有探测点聚合后的均值
    CITY_DATA[prov][city] = dates.map((date, di) => {
      const trend = Math.sin(di / 3 + ci) * 2;
      const jitter = (rng() - 0.5) * 6;
      return { date, avg_delay: Math.max(2, +(info.base + trend + jitter).toFixed(2)) };
    });
    // 每个探测点（如"济南市-最北点"）独立数据
    info.points.forEach((point, pi) => {
      const rng2 = srand(PROVINCES.indexOf(prov) * 1000 + ci * 100 + pi * 17 + 42);
      const pointKey = `${city.replace('市','')}-${point}`;
      CITY_DATA[prov][pointKey] = dates.map((date, ddi) => {
        const jitter = (rng2() - 0.5) * 8;
        return { date, avg_delay: Math.max(2, +(info.base + 1.5 + Math.sin(ddi / 4 + pi) * 3 + jitter).toFixed(2)) };
      });
    });
  });
});

/* ════════════════════════════════════════════
   State
   ════════════════════════════════════════════ */
let curMetric = 'delay';
let drillProvince = null;  // null = 省级视图, string = 地市级视图
let highlightName = null;  // 点击折线高亮
let hoverName = null;      // 鼠标悬停的折线
let alertThreshold = 30;   // 固定告警阈值(ms)

/* ════════════════════════════════════════════
   Helpers
   ════════════════════════════════════════════ */
function getDelayLevel(v) {
  if (v <= 20) return 'green';
  if (v <= 30) return 'yellow';
  return 'red';
}

function delayColor(v) {
  if (v <= 20) return '#67c23a';
  if (v <= 30) return '#e6a23c';
  return '#f56c6c';
}

function heatmapColor(v) {
  if (v <= 20) return 'rgba(103,194,58,0.06)';
  if (v <= 30) return 'rgba(230,162,60,0.06)';
  return 'rgba(245,108,108,0.06)';
}

function heatmapTextColor(v) {
  if (v <= 20) return '#67c23a';
  if (v <= 30) return '#e6a23c';
  return '#f56c6c';
}

function peakColor(v) {
  return v > getAlertThreshold() ? 'rgba(245,108,108,0.96)' : 'rgba(64,158,255,0.92)';
}

function peakTextColor(v) {
  return v > getAlertThreshold() ? '#f56c6c' : '#409EFF';
}

function avg(arr) {
  if (!arr.length) return 0;
  return +(arr.reduce((s, d) => s + d.avg_delay, 0) / arr.length).toFixed(2);
}

function getVisibleData() {
  if (drillProvince) {
    // 下钻视图：只显示该省各地市级聚合数据（不含探测点明细）
    const raw = CITY_DATA[drillProvince];
    const cities = {};
    Object.entries(raw).forEach(([key, arr]) => {
      if (!key.includes('-')) cities[key] = arr; // 只取"济南市"，跳过"济南市-最北点"
    });
    return cities;
  }
  // 省级视图：全部省份
  return PROV_DATA;
}

function getAlertThreshold() {
  return Number(alertThreshold) || 0;
}

function getActiveSeriesName() {
  return hoverName || highlightName;
}

function getLegendData(names) {
  const activeName = getActiveSeriesName();
  return names.map(name => ({
    name,
    textStyle: !activeName
      ? { color: '#909399', fontSize: 11, fontWeight: 400 }
      : name === activeName
        ? { color: '#303133', fontSize: 11, fontWeight: 600 }
        : { color: '#c0c4cc', fontSize: 11, fontWeight: 400 }
  }));
}

function syncHoverLinkedViews() {
  renderRanking();
  renderHeatmap();
  if (!chart) return;
  const names = Object.keys(getVisibleData());
  chart.setOption({
    legend: {
      data: getLegendData(names),
      textStyle: { color: '#909399', fontSize: 11 },
    }
  });
}

/* ════════════════════════════════════════════
   Render
   ════════════════════════════════════════════ */
function renderMetricToggle() {
  document.getElementById('metricGroup').innerHTML = [
    { key: 'delay', label: '平均时延(ms)' },
  ].map(m => `<div class="radio-item ${m.key === curMetric ? 'active' : ''}" onclick="setMetric('${m.key}')">${m.label}</div>`).join('');
}

function renderProvBar() {
  const row = document.getElementById('provBarRow');
  const select = document.getElementById('provSelect');
  if (!row || !select) return;
  row.style.display = 'flex';
  select.innerHTML = [`<option value="">全国</option>`].concat(
    PROVINCES.map(p => `<option value="${p}" ${drillProvince === p ? 'selected' : ''}>${p}</option>`)
  ).join('');
  select.value = drillProvince || '';
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (!drillProvince) { el.innerHTML = `<span style="color:#303133;font-weight:500;">全国</span>`; return; }
  el.innerHTML = `<a onclick="drillUp()">全国</a><span class="sep">/</span><span style="color:#303133;font-weight:500;">${drillProvince}</span>`;
}

function drillUp() { drillProvince = null; highlightName = null; hoverName = null; refresh(); }
function drillDown(prov) { drillProvince = prov; highlightName = null; hoverName = null; refresh(); }
function onProvinceSelectChange(value) {
  if (!value) {
    drillUp();
    return;
  }
  drillDown(value);
}

function onAlertThresholdChange(value) {
  const next = Number(value);
  alertThreshold = Number.isFinite(next) && next >= 0 ? next : 0;
  const input = document.getElementById('alertThresholdInput');
  if (input) input.value = alertThreshold;
  refresh();
}

// ── ECharts ──
let chart = null;
let chartInited = false;
let legendLock = false;  // 防止 setOption 触发 legendselectchanged 回环

function toggleHighlight(name) {
  highlightName = highlightName === name ? null : name;
  refresh();
}

function renderChart() {
  if (!chart) chart = echarts.init(document.getElementById('chartMain'));
  const data = getVisibleData();
  const names = Object.keys(data);
  const unit = 'ms';

  // 颜色：高亮/普通/灰色
  const palette = ['#409EFF','#67C23A','#E6A23C','#F56C6C','#909399','#b37feb','#36cfc9','#ff85c0','#ffc53d','#73d13d','#40a9ff','#ff7875','#597ef7','#ff9c6e','#5cdbd3'];

  const activeHoverName = hoverName;
  const activeLockName = highlightName;
  const allSeriesValues = names.flatMap(name => data[name].map(d => d.avg_delay));
  const maxSeriesValue = allSeriesValues.length ? Math.max(...allSeriesValues, getAlertThreshold()) : getAlertThreshold();
  const chartMax = Math.max(35, Math.ceil((maxSeriesValue + 2) / 5) * 5);
  const series = names.map((name, i) => {
    const isHovered = activeHoverName === name;
    const isLocked = activeLockName === name;
    const hasHover = !!activeHoverName;
    const hasLock = !!activeLockName;
    const isDimmedByHover = hasHover && !isHovered;
    const isDimmedByLock = !hasHover && hasLock && !isLocked;
    const isDimmed = isDimmedByHover || isDimmedByLock;
    const baseColor = palette[i % palette.length];
    return {
      name, type: 'line', smooth: true, symbol: 'circle', triggerLineEvent: true,
      symbolSize: isHovered ? 10 : isLocked ? 8 : 4,
      showSymbol: true,
      z: isHovered ? 5 : isLocked ? 4 : 1,
      lineStyle: {
        width: isHovered ? 5.5 : isLocked ? 3.8 : 1.2,
        opacity: isDimmed ? 0.08 : isLocked ? 1 : 0.9,
        color: isLocked && !isHovered ? '#1f78ff' : baseColor,
      },
      itemStyle: {
        color: isLocked && !isHovered ? '#1f78ff' : baseColor,
        opacity: isDimmed ? 0.16 : 1,
        borderWidth: isHovered ? 2 : isLocked ? 1 : 0,
        borderColor: '#fff'
      },
      emphasis: {
        focus: 'series',
        blurScope: 'coordinateSystem',
        scale: true,
        lineStyle: { width: 5.5, opacity: 1 },
        itemStyle: { borderWidth: 2, borderColor: '#fff', opacity: 1 }
      },
      blur: {
        lineStyle: { opacity: hasHover ? 0.06 : hasLock ? 0.08 : 0.12 },
        itemStyle: { opacity: hasHover ? 0.12 : hasLock ? 0.16 : 0.2 }
      },
      data: data[name].map(d => d.avg_delay),
    };
  });

  chart.setOption({
    tooltip: {
      trigger: 'axis', backgroundColor: '#fff', borderColor: '#ebeef5', borderWidth: 1,
      textStyle: { color: '#606266', fontSize: 12 },
      formatter: params => {
        const activeParams = hoverName
          ? params.filter(p => p.seriesName === hoverName)
          : params;
        if (!activeParams.length) return '';
        let s = `<b style="color:#303133">${activeParams[0].axisValue}</b><br/>`;
        activeParams.forEach(p => {
          const v = p.value;
          const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${delayColor(v)};margin-right:4px;"></span>`;
          const threshold = getAlertThreshold();
          const over = v > threshold ? ' ⚠️' : '';
          s += `${dot}${p.seriesName}: <b>${v}</b>${unit}${over}<br/>`;
        });
        return s;
      }
    },
    legend: {
      type: 'scroll', bottom: 0,
      data: getLegendData(names),
      textStyle: { color: '#909399', fontSize: 11 },
      selected: names.reduce((o, n) => { o[n] = true; return o; }, {}),
    },
    grid: { top: 24, right: 20, bottom: 50, left: 50 },
    xAxis: {
      type: 'category', data: dates.map(d => d.slice(5)),
      axisLine: { lineStyle: { color: '#dcdfe6' } },
      axisLabel: { color: '#909399', fontSize: 11 },
    },
    yAxis: {
      type: 'value', min: 0, max: chartMax,
      name: unit,
      nameTextStyle: { color: '#909399', fontSize: 11 },
      splitLine: { lineStyle: { color: '#ebeef5' } },
      axisLabel: { color: '#909399', fontSize: 11 },
    },
    series, animationDuration: 400,
  }, true);

  // 背景色区域标注
  chart.setOption({
    series: [{
      markArea: {
        silent: true, itemStyle: { borderWidth: 0 },
        data: [
          [{ yAxis: 0, itemStyle: { color: 'rgba(103,194,58,0.06)' } }, { yAxis: 20 }],
          [{ yAxis: 20, itemStyle: { color: 'rgba(230,162,60,0.06)' } }, { yAxis: 30 }],
          [{ yAxis: 30, itemStyle: { color: 'rgba(245,108,108,0.06)' } }, { yAxis: chartMax }],
        ]
      }
    }]
  });

  // 图例点击 → 高亮该线，其他置灰（只注册一次，带锁防回环）
  if (!chartInited) {
    chartInited = true;
    chart.on('click', params => {
      if (!params || params.componentType !== 'series') return;
      toggleHighlight(params.seriesName);
    });

    chart.on('mouseover', params => {
      if (!params || params.componentType !== 'series') return;
      hoverName = params.seriesName;
      syncHoverLinkedViews();
    });

    chart.on('mouseout', params => {
      if (!params || params.componentType !== 'series') return;
      if (hoverName === params.seriesName) {
        hoverName = null;
        syncHoverLinkedViews();
      }
    });

    chart.on('globalout', () => {
      if (hoverName === null) return;
      hoverName = null;
      syncHoverLinkedViews();
    });

    chart.getZr().on('click', event => {
      if (event.target) return;
      if (highlightName === null) return;
      highlightName = null;
      refresh();
    });

    chart.on('legendselectchanged', params => {
      if (legendLock) return;  // setOption 触发的回环直接跳过
      const selected = Object.entries(params.selected).filter(([k, v]) => v);
      highlightName = selected.length === 1 ? selected[0][0] : null;
      legendLock = true;
      refresh();
      legendLock = false;
    });
  }

  document.getElementById('chartTitle').textContent = drillProvince ? `${drillProvince} — 地市趋势` : '近 7 天趋势对比';
  document.getElementById('chartSub').textContent = drillProvince
    ? '点击地市折线或图例高亮，其他地市置灰'
    : '点击省份折线或图例高亮，其他省份置灰';
}

// ── 排行 ──
function renderRanking() {
  const data = getVisibleData();
  const names = Object.keys(data);
  const unit = ' ms';

  const rows = names.map(name => {
    const avgVal = avg(data[name]);
    const maxDay = Math.max(...data[name].map(d => d.avg_delay));
    const alertCount = data[name].filter(d => d.avg_delay > getAlertThreshold()).length;
    const isAlert = maxDay > getAlertThreshold();
    return { name, avgVal, maxDay, alertCount, isAlert };
  });

  rows.sort((a, b) => b.avgVal - a.avgVal);

  const el = document.getElementById('rankBody');
  el.innerHTML = `<div class="rank-table">
    <div class="rank-row rank-head">
      <div>#</div>
      <div class="rank-prov">名称</div>
      <div class="rank-val">7天均值</div>
      <div class="rank-threshold">峰值</div>
      <div class="rank-threshold">异常点</div>
      <div class="rank-status">状态</div>
    </div>
    ${rows.map((r, i) => {
      const rc = i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : 'rn';
      const isHover = hoverName === r.name;
      const isLock = !hoverName && highlightName === r.name;
      const activeName = getActiveSeriesName();
      const isDim = activeName && !isHover && !isLock;
      const rowClass = isHover ? 'hover-highlight' : isLock ? 'lock-highlight' : isDim ? 'dimmed' : '';
      const clickAttr = !drillProvince ? `onclick="drillDown('${r.name}')"` : '';
      return `<div class="rank-row ${rowClass}" data-rank-name="${r.name}" ${clickAttr}>
        <div><span class="rank-num ${rc}">${i + 1}</span></div>
        <div class="rank-prov">${r.name}</div>
        <div class="rank-val" style="color:${delayColor(r.avgVal)}">${r.avgVal}${unit}</div>
        <div class="rank-threshold" style="color:${peakTextColor(r.maxDay)};font-weight:${r.maxDay > getAlertThreshold() ? '600' : '500'};">${r.maxDay}ms</div>
        <div class="rank-threshold" style="color:${r.alertCount > 0 ? '#f56c6c' : '#909399'};font-weight:${r.alertCount > 0 ? '600' : '500'};">${r.alertCount}</div>
        <div class="rank-status"><span class="rank-tag ${r.isAlert ? 'tag-alert' : 'tag-normal'}">${r.isAlert ? '告警' : '正常'}</span></div>
      </div>`;
    }).join('')}
  </div>`;

  document.getElementById('rankSub').textContent = drillProvince
    ? `${drillProvince} 地市排行（告警阈值：${getAlertThreshold()}ms）`
    : `按 7 天均值降序（告警阈值：${getAlertThreshold()}ms）`;
}

// ── 热力矩阵 ──
function renderHeatmap() {
  const data = getVisibleData();
  const names = Object.keys(data);

  let allV = []; names.forEach(n => data[n].forEach(d => allV.push(d.avg_delay)));
  const vmin = Math.min(...allV), vmax = Math.max(...allV);

  let html = '<table class="hm-table"><thead><tr><th>名称</th>';
  dates.forEach(d => { html += `<th>${d.slice(5)}</th>`; });
  html += '<th>峰值</th>';
  html += '</tr></thead><tbody>';
  names.forEach(name => {
    const isHover = hoverName === name;
    const isLock = !hoverName && highlightName === name;
    const activeName = getActiveSeriesName();
    const isDim = activeName && !isHover && !isLock;
    const rowClass = isHover ? 'hover-highlight' : isLock ? 'lock-highlight' : isDim ? 'dimmed' : '';
    const peak = Math.max(...data[name].map(d => d.avg_delay));
    const alertCount = data[name].filter(d => d.avg_delay > getAlertThreshold()).length;
    const hasAlertPoint = alertCount > 0;
    html += `<tr class="hm-row ${rowClass}" data-hm-name="${name}"><td title="${hasAlertPoint ? `本周存在 ${alertCount} 个异常点` : '本周无异常点'}"><span class="${hasAlertPoint ? 'hm-name-alert' : ''}">${name}</span></td>`;
    data[name].forEach(d => {
      const v = d.avg_delay;
      html += `<td><div class="hm-cell" style="background:${heatmapColor(v)}" title="${name} ${d.date}\n时延: ${v}ms">${v}</div></td>`;
    });
    html += `<td><div class="hm-cell" style="background:${peakColor(peak)}" title="${name} 峰值\n峰值: ${peak}ms">${peak}</div></td>`;
    html += '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById('hmWrap').innerHTML = html;
  document.getElementById('hmSub').textContent = drillProvince
    ? `${drillProvince} 各地市 × 日期`
    : '省份 × 日期，颜色编码时延级别';
}

function setMetric(m) { curMetric = m; refresh(); }

function refresh() {
  renderMetricToggle();
  renderProvBar();
  renderBreadcrumb();
  renderChart();
  renderRanking();
  renderHeatmap();
}

window.addEventListener('resize', () => { if (chart) chart.resize(); });
refresh();
</script>
</body>
</html>
